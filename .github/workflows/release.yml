name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Build for ${{ matrix.arch }}
        run: |
          clang -framework Foundation -framework Cocoa \
            -arch ${{ matrix.arch }} \
            -o nightshift-${{ matrix.arch }} \
            nightshift.m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightshift-${{ matrix.arch }}
          path: nightshift-${{ matrix.arch }}

  release:
    runs-on: macos-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create universal binary
        run: |
          lipo -create \
            nightshift-x86_64/nightshift-x86_64 \
            nightshift-arm64/nightshift-arm64 \
            -output nightshift

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nightshift
            nightshift-x86_64/nightshift-x86_64
            nightshift-arm64/nightshift-arm64
